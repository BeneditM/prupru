<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Precios</title>
    <style> body { font-family: Arial, sans-serif; text-align: center; }
        h2 { margin-bottom: 10px;}
        table {margin: 20px auto;
        border-collapse: collapse; width: 60%;}
        th, td {border: 2px solid black; padding: 10px;}
        th {background-color: f2f2f2;}
        .no-border {border: none;}
    </style>
</head>
<body>
    
    <h2>Lista de Precios de Servicios</h2>

        <ul>
            <li>Diseño web - $500</li>
            <li>Diseño Grafico - $300</li>
            <li>Seo - $200</li>
        </ul>

    <h2>Tabla Comparativa de Precios</h2>

    <table>
        <tr>
            <th rowspan="2">Producto</th>
            <th colspan="2">Precio</th>
        </tr>
        <tr>
            <th>Antiguo</th>
            <th>Nuevo</th>
        </tr>
        <tr>
            <td>Producto 1</td>
            <td>10.00</td>
            <td>12.00</td>
        </tr>
        <tr>
            <td>Producto 2</td>
            <td>15.00</td>
            <td>18.00</td>
        </tr>
    </table>

</body>
</html>
