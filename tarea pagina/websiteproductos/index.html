<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibicion de productos</title>


</head>

<body>
    <header>
        <h1>Nuestros Nuevos productos</h1>
    </header>
    <Main>
        <div class="product">
            <div class="product-image">
                <img src="/tarea pagina/websiteproductos/multimedia/ingredientes.png" alt="ingredientes">
                <span class="badge">Nuevo</span>
            </div>
            <h2>Nombre del producto</h2>
            <p>Aqui tengo que poner una descripcion del producto que voy a presentar</p>
        </div>

    <table class="product-specs">
        <tr><th>Caracteristica</th><th>Detalles</th></tr>
        <tr><td>Peso</td><td>1kg</td></tr>
        <tr><td>Color</td><td>Rojo</td></tr>
        <tr><td>Material</td><td>Plastico</td></tr>
    </table>
    <div class="contact-form">
        <form>
            <fieldset>
                <legend>Contactanos</legend>
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name">
                <label for="email">Correo Electronico:</label>
                <input type="email" id="email" name="email">
                <button type="submit">Enviar=</button>
            </fieldset>
        </form>

    </div>
</Main>
<footer>
    <p>@ 2026 Tienda Anime en Linea by Dominican Republic </p>
</footer>


</body>
</html>
