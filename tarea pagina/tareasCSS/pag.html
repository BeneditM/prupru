<!DOCTYPE html>
<html lang="Es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entendiendo la cascada, especificidad y herencia en css</title>
<link rel="stylesheet" href="pag.css">
</head>

<body>
  <h1 style="color: blue;">Entendiendo la cascada en css</h1>
  <p>Este es un parrafo.</p>
  <p class="especial">Este es un parrafo especial</p>
  <p id="unique">Este es un parrafo unico</p>
  
  <div id="parent">
    <p>Este es un parrafo hijo</p>
    <p>Este es otro parrafo hijo</p>
  </div>
  <h2>Un encabezado antes de un parrafo importante</h2>
  <p class="importante">Este es un parrafo importante</p>  


</body>
</html>
