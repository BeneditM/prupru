<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gundam Wing website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    header {
      position: relative;
      height: 60vh;
      overflow: hidden;
    }

    header video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Overlay oscuro */
    header::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    /* Contenido encima */
    .header-content {
      position: relative;
      z-index: 2;
      color: white;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 3rem;
    }

    p {
      font-size: 1.2rem;
    }
  </style>
</head>

<body>

  <header>
    <video id="bgVideo" autoplay muted loop>
      <source src="/tarea pagina/tarealink/gundam/multimedia/gundamopening.mp4" type="video/mp4">
      
    </video>
    <button onclick="activarAudio()">Activar sonido</button>

    <script> /* El SCRIPT es opcional porque no lo necesito realmente para nada */
        function activarAudio() {
          const video = document.getElementById("bgVideo");
          video.muted = false;
          video.play();
        }
        </script>

    <div class="header-content">
      <h1>Gundam Wing FansBlog</h1>
      <p>Explora Japanese Original Mecha Anime</p>
    </div>
  </header>

</body>
</html>
